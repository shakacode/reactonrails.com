name: Site Build and Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync docs
        run: npm run sync:docs
        env:
          REACT_ON_RAILS_REPO_URL: https://github.com/shakacode/react_on_rails.git
          REACT_ON_RAILS_REF: main

      - name: Prepare docs
        run: npm run prepare:docs

      - name: Install site dependencies
        run: npm --prefix prototypes/docusaurus install

      - name: Build site
        run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync docs
        run: npm run sync:docs
        env:
          REACT_ON_RAILS_REPO_URL: https://github.com/shakacode/react_on_rails.git
          REACT_ON_RAILS_REF: main

      - name: Prepare docs
        run: npm run prepare:docs

      - name: Install site dependencies
        run: npm --prefix prototypes/docusaurus install

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy prototypes/docusaurus/build --project-name "${CLOUDFLARE_PAGES_PROJECT:-reactonrails-com}" --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
